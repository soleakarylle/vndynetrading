
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>vndyne's collection</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>vndyne's collection</h1>
</header>

<div class="container">

<section class="stats">
<div class="stat">
<h2 id="totalCount">0</h2>
<p>Total Boots</p>
</div>

<div class="stat">
<h2 id="videoCount">0</h2>
<p>Videos</p>
</div>

<div class="stat">
<h2 id="audioCount">0</h2>
<p>Audios</p>
</div>
</section>

<div class="controls">

<input id="search" placeholder="Search collection..." oninput="apply()">

<select id="typeFilter" onchange="apply()">
<option value="">All Types</option>
<option value="Video">Video</option>
<option value="Audio">Audio</option>
</select>

<select id="showFilter" onchange="apply()">
<option value="">All Shows</option>
</select>

</div>

<table id="collectionTable">

<thead>
<tr>
<th>Type</th>
<th>Show</th>
<th>Date</th>
<th>City</th>
<th>Cast</th>
<th>Format</th>
<th>Link</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<footer>
<p>vndyne 2026</p>
</footer>

<script src="script.js"></script>

<script>
fetch("collection.json").then(r=>r.json()).then(json=>{
data=json
populateShows()
updateStats()
render(data)
})
</script>

</body>
</html>
